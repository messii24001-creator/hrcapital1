<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet History • HR Capital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/wallet-history.css">

</head>

<body>

<div class="shell">

    <div class="pageHeader">
        <button class="backBtn" onclick="location.href='dashboard.html'">←</button>
        <div>
            <h1>Wallet History</h1>
            <p class="subText">Every HR point earned, redeemed or awarded</p>
        </div>
    </div>

    <div class="summary">
        <div class="summaryCard">
            <p>Earned</p>
            <h2 id="totalEarned" class="mono">0</h2>
        </div>
        <div class="summaryCard">
            <p>Redeemed</p>
            <h2 id="totalRedeemed" class="mono">0</h2>
        </div>
    </div>

    <div class="tabRow">
        <button class="tabBtn active" data-source="all">All</button>
        <button class="tabBtn" data-source="recharge">Recharge</button>
        <button class="tabBtn" data-source="voucher">Voucher</button>
        <button class="tabBtn" data-source="general">General</button>
    </div>

    <div id="walletList">
        <div class="emptyState">
            <div class="icon">⏳</div>
            Loading...
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script type="module" src="Js/wallet-history.js"></script>

</body>
</html>
