<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sell Voucher • HR Capital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="shell">

    <div class="pageHeader">
        <button class="backBtn" onclick="location.href='admin-dashboard.html'">←</button>
        <div>
            <h1>Sell Voucher</h1>
            <p class="subText">Record a voucher sale for a customer</p>
        </div>
    </div>

    <div class="panel">
        <div class="field">
            <label>Customer Mobile</label>
            <input type="tel" id="searchMobile" placeholder="Enter customer mobile" maxlength="10">
        </div>
        <button class="btnGhost" id="searchBtn">🔍 Search Customer</button>
    </div>

    <div class="panel">
        <h3>Customer</h3>
        <div class="infoRow"><b>Name</b><span id="name">-</span></div>
        <div class="infoRow"><b>Mobile</b><span id="mobile">-</span></div>
        <div class="infoRow"><b>Current HR</b><span id="currentHR">-</span></div>
    </div>

    <div class="panel">

        <div class="field">
            <label>Voucher Name</label>
            <input type="text" id="voucherName" placeholder="e.g. Amazon ₹500 Gift Voucher">
        </div>

        <div class="field">
            <label>Voucher Code (optional)</label>
            <input type="text" id="voucherCode" placeholder="e.g. AMZN-1234-5678">
        </div>

        <div class="field">
            <label>Price Paid (₹)</label>
            <input type="number" id="price" placeholder="e.g. 500" min="1">
        </div>

        <div class="field">
            <label>Payment Mode</label>
            <select id="paymentMode">
                <option>Cash</option>
                <option>Online</option>
            </select>
        </div>

        <button class="btnPrimary" id="saveBtn">
            <span id="saveBtnText">🎫 Record Voucher Sale</span>
        </button>

    </div>

    <div class="panel" id="reminderPanel">
        <p class="subText">💡 Tip: after saving, go to <b>Give Scratch Card</b> to reward this customer — set "Given For" to <b>Voucher Purchase</b> so it shows correctly in their Wallet History.</p>
        <button class="btnGhost" onclick="location.href='give-scratch.html'" style="margin-top:10px;">🎁 Go to Give Scratch Card</button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script type="module" src="Js/add-voucher.js"></script>

</body>
</html>
