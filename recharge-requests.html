<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recharge Requests • HR Capital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="shell">

    <div class="pageHeader">
        <button class="backBtn" onclick="location.href='admin-dashboard.html'">←</button>
        <div>
            <h1>Recharge Requests</h1>
            <p class="subText">Approve or reject customer requests</p>
        </div>
    </div>

    <div class="tabRow">
        <button class="tabBtn active" data-status="pending">Pending</button>
        <button class="tabBtn" data-status="approved">Approved</button>
        <button class="tabBtn" data-status="rejected">Rejected</button>
        <button class="tabBtn" data-status="all">All</button>
    </div>

    <div id="requestList">
        <div class="emptyState">
            <div class="icon">⏳</div>
            Loading requests...
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script type="module" src="Js/recharge-requests.js"></script>

</body>
</html>
